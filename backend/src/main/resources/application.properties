server.port=8080

# Allow uploads up to 200 MB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Number of concurrent pdftoppm worker processes used during final rendering.
# Each worker handles one batch of pages (BATCH_SIZE = 10) in parallel.
# Increase for machines with more CPU cores; decrease to reduce memory pressure.
cropit.render.worker-pool-size=8

# Logging
logging.level.com.cropit=DEBUG
